<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Login - PlacementorAI</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Dark Mode -->
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    #theme-toggle {
      transition: all 0.3s ease;
    }

    #theme-toggle:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body class="min-h-screen bg-slate-50 dark:bg-gray-900 transition-colors duration-300 flex flex-col">

  <!-- HEADER -->
  <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

      <a href="index.html"
         class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
        PlacementorAI
      </a>

      <button
        id="theme-toggle"
        class="px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 dark:text-white"
        aria-label="Toggle dark mode"
      >
        🌙
      </button>

    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-1 flex items-center justify-center px-6 py-12">

    <div id="login-card"
         class="w-full max-w-md opacity-0 translate-y-6">

      <!-- Heading -->
      <div class="text-center mb-6">
        <h1 class="text-4xl font-bold text-gray-900 dark:text-white mb-2">
          Welcome Back
        </h1>

        <p class="text-gray-600 dark:text-gray-400">
          Log in to your account
        </p>
      </div>

      <!-- Card -->
      <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700">

        <form id="loginForm" class="space-y-5">

          <!-- Role -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-2">
              I am a...
            </label>

            <select
              id="role"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none"
            >
              <option value="">Select your role</option>
              <option value="student">Student</option>
              <option value="recruiter">Recruiter</option>
              <option value="admin">Placement Officer (Admin)</option>
            </select>
          </div>

          <!-- Email -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-2">
              Email Address
            </label>

            <input
              type="email"
              id="email"
              placeholder="you@example.com"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none"
            />
          </div>

          <!-- Password -->
          <div class="relative">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-2">
              Password
            </label>

            <input
              type="password"
              id="password"
              placeholder="••••••••"
              class="w-full px-4 py-3 pr-12 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none"
            />

            <button
              type="button"
              id="togglePassword"
              class="absolute right-4 top-[44px] text-gray-400 hover:text-indigo-600"
            >
              <i id="eyeIcon" data-lucide="eye"></i>
            </button>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            id="loginBtn"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-xl transition active:scale-95 flex items-center justify-center gap-2"
          >
            <i data-lucide="log-in"></i>
            <span id="btnText">Sign In</span>
          </button>

          <!-- Divider -->
          <div class="flex items-center my-4">
            <hr class="flex-grow border-gray-300 dark:border-gray-600">
            <span class="px-2 text-gray-400 text-sm">OR</span>
            <hr class="flex-grow border-gray-300 dark:border-gray-600">
          </div>

          <!-- Social -->
          <div class="flex gap-4">

            <button
              type="button"
              class="flex-1 flex items-center justify-center gap-2 border border-gray-300 dark:border-gray-600 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition dark:text-white text-sm"
            >
              <img src="https://img.icons8.com/color/20/google-logo.png" alt="Google">
              Google
            </button>

            <button
              type="button"
              class="flex-1 flex items-center justify-center gap-2 border border-gray-300 dark:border-gray-600 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition dark:text-white text-sm"
            >
              <img src="https://img.icons8.com/ios-glyphs/20/github.png" class="dark:invert" alt="GitHub">
              GitHub
            </button>

          </div>
        </form>
      </div>

      <!-- Footer -->
      <p class="text-center text-sm mt-6 text-gray-600 dark:text-gray-400">
        Don’t have an account?
        <a href="register.html" class="text-indigo-600 font-semibold hover:underline">
          Register here
        </a>
      </p>

    </div>
  </main>

  <!-- Theme Script -->
  <script src="js/theme.js"></script>
  
  <!-- Auth Script -->
  <script src="js/login.js"></script>

  <!-- Animations -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      if (window.lucide) {
        lucide.createIcons();
      }

      gsap.to("#login-card", {
        opacity: 1,
        y: 0,
        duration: 0.6,
        ease: "power3.out"
      });

      const togglePassword = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");

      togglePassword.addEventListener("click", () => {
        if (passwordInput.type === "password") {
          passwordInput.type = "text";
        } else {
          passwordInput.type = "password";
        }
      });
    });
  </script>

</body>
</html>
